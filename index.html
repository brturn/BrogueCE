<html>
    <head>
        <style>
            html, body {
                width: 100%;
                height: 100%;
                margin: 0;
                background: #333333;
                color: #e6e6e6;
                background-attachment: fixed;
                overflow: hidden;
            }
            body a {
                color: #e6e6e6;
            }
            body a:hover {
                color: #6666cb;
            }
            #game-canvas {
                object-fit: contain;
                flex-grow: 1;
                flex-shrink: 1;
                background: #333333; /* fullscreen */
            }
            #game-frame{
                display: none;
            }
            #project-info{
                text-align: center;
            }
            #project-info .close{
                float: right;
                padding-right: 15px;
            }
            #project-info #left-nav{
                float: left;
                padding-left: 15px;
            }
            .initalized{
                display: flex;
                flex-direction: column;
                align-content: stretch;
                align-items: stretch;
            }
            div {
              margin: 2px;
            }
            span {
              height: 100%;
            }
            img.delete {
              max-width: 1.5em;
              max-height: 1.5em;
              margin: 2px;
            }
            img.download {
              max-width: 1.5em;
              max-height: 1.5em;
              margin: 2px;
            }
            .close {
              font-style: normal;
              text-decoration-line: none;
            }
            .list-item {
              display: flex;
              align-items: center;
              height: 2em;
            }
            .item-text {
              display: flex;
              align-items: center;
              height: 100%;
              padding-left: 0.5em;
            }
            .floating-div {
                position: fixed;
                top: 2em;
                left: 10%;
                width: 40%;
                height: 30%;
                overflow-y: auto;
                background-color: #333333;
                border: 1px solid black;
                padding: 10px;
                z-index: -1000;
                color: white;
            }
        </style>
        <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.js"></script>
        <script type="text/javascript">
            let ctx, ctxWidth, ctxHeight, cellWidth, cellHeight;
            const origin = window.location.origin;
            const CONSOLE_HEIGHT = 34;
            const CONSOLE_WIDTH = 100;
            const eventTypes = {
                KEYSTROKE:0,
                MOUSE_UP:1,
                MOUSE_DOWN:2,
                RIGHT_MOUSE_DOWN:3,
                RIGHT_MOUSE_UP:4,
                MOUSE_ENTERED_CELL:5
            }
            function throttle(fn, threshhold, scope) {
                threshhold || (threshhold = 250);
                let last,
                    deferTimer;
                return function () {
                    const context = scope || this;

                    const now = +new Date,
                        args = arguments;
                    if (last && now < last + threshhold) {
                        // hold on to it
                        clearTimeout(deferTimer);
                        deferTimer = setTimeout(function () {
                            last = now;
                            fn.apply(context, args);
                        }, threshhold);
                    } else {
                        last = now;
                        fn.apply(context, args);
                    }
                };
            }
            function onMessage(e){
                if (origin !== e.origin) return;
                e.data.forEach((plotChar)=>{
                    let [char, x, y, fr, fg, fb, br, bg, bb] = plotChar;
                    x = x*cellWidth
                    y = y*cellHeight
                    ctx.fillStyle = `rgb(${br/100*255|0}, ${bg/100*255|0}, ${bb/100*255|0})`
                    ctx.fillRect(x,y,cellWidth,cellHeight)
                    ctx.fillStyle = `rgb(${fr/100*255|0}, ${fg/100*255|0}, ${fb/100*255|0})`
                    ctx.fillText(String.fromCharCode(char), x, y);
                });
            }
            function  getMousePos(canvas, evt) {
                const rect = canvas.getBoundingClientRect(), // abs. size of element
                    actualWidth = Math.min(rect.height*(canvas.width/canvas.height), rect.width)|0, //object-fit means the canvas ele will be scaled proportionally
                    actualHeight = Math.min(rect.width*(canvas.height/canvas.width), rect.height)|0, //so calculate actual width and height
                    scale = canvas.width/actualWidth,
                    offsetX = (rect.width-actualWidth)/2,
                    offsetY = (rect.height-actualHeight)/2
                ;
                const x = (evt.clientX - rect.left) - offsetX;
                const y = (evt.clientY - rect.top) - offsetY;
                if (x<0 || x>actualWidth)  return null; // ignore if object-fit causes us to be outside actual canvas
                if (y<0 || y>actualHeight) return null; // ignore if object-fit causes us to be outside actual canvas
                const pix = [x*scale, y*scale] // in pixels
                const pos = [(pix[0]/cellWidth)|0, (pix[1]/cellHeight)|0] // in cells
                return pos
            }
            let lastMouseCell = [-1,-1];
            function onMouseMove(e){
                const pos = getMousePos(this, e);
                if (!pos) return;
                if (lastMouseCell[0]===pos[0] && lastMouseCell[1]===pos[1]) return; //cell did not change...bail
                lastMouseCell = pos;
                document.getElementById('game-frame').contentWindow.postMessage([
                    eventTypes.MOUSE_ENTERED_CELL, pos[0], pos[1], e.ctrlKey?1:0, e.shiftKey?1:0
                ], "*")
            }
            function onMouseDown(e){
                const pos = getMousePos(this, e);
                if (!pos) return;
                document.getElementById('game-frame').contentWindow.postMessage([
                    e.button===0?eventTypes.MOUSE_DOWN:eventTypes.RIGHT_MOUSE_DOWN, pos[0], pos[1], e.ctrlKey?1:0, e.shiftKey?1:0
                ], "*")
            }
            function onMouseUp(e){
                const pos = getMousePos(this, e);
                if(!pos) return;
                document.getElementById('game-frame').contentWindow.postMessage([
                    e.button===0?eventTypes.MOUSE_UP:eventTypes.RIGHT_MOUSE_UP, pos[0], pos[1], e.ctrlKey?1:0, e.shiftKey?1:0
                ], "*")
            }
            const KEY_MAP = {
                ArrowUp: 63232,
                ArrowLeft: 63234,
                ArrowDown: 63233,
                ArrowRight: 63235,
                PageUp:63276,
                PageDown:63277,
                Escape:27,
                Return:13,
                Enter:10,
                Delete:127,
                Tab:9,
            }
            function onKeydown(e){
                const key = (e.key.length > 1) ? KEY_MAP[e.key] : e.key.charCodeAt(0);
                document.getElementById('game-frame').contentWindow.postMessage([eventTypes.KEYSTROKE, key, 0, e.ctrlKey?1:0, e.shiftKey?1:0], "*")
            }

            function preventDefault(e) {
                e.preventDefault();
            }

            function onRequestFullscreen() {
                const ele = document.getElementById('game-canvas');
                if (ele) (ele.requestFullscreen || ele.webkitRequestFullscreen || ele.mozRequestFullScreen || ele.msRequestFullscreen).call(ele);
            }

            function onRequestFiles() {
                readDatabase();
                document.getElementById('file-manager').style.zIndex = 1000;
            }

            $(function(){
                const canvas = document.getElementById('game-canvas');
                ctx = canvas.getContext("2d");
                ctxWidth = ctx.canvas.clientWidth;
                ctxHeight = ctx.canvas.clientHeight;
                cellWidth = ctxWidth/CONSOLE_WIDTH;
                cellHeight = ctxHeight/CONSOLE_HEIGHT;
                ctx.fillRect(0, 0, ctxWidth, ctxHeight);
                ctx.textBaseline = "top";
                ctx.fillStyle = 'white';

                // Find proper font size
                ctx.font = '10px monospace';
                for (i = 7; i < 20; i++) {
                    ctx.font = i+'px monospace';
                    if(ctx.measureText('A').width > cellWidth){
                        ctx.font = (i-1)+'px monospace';
                        break;
                    }
                }

                // Canvas has strange interactions with CSS so we do alot of the styling after canvas is initalized
                document.getElementsByTagName('body')['0'].className = "initalized"

                // Register event handlers
                window.addEventListener('message', onMessage, false);
                window.addEventListener('keydown', onKeydown, false);
                document.getElementById('game-canvas').addEventListener('mousedown', onMouseDown, false);
                document.getElementById('game-canvas').addEventListener('mouseup', onMouseUp, false);
                document.getElementById('game-canvas').addEventListener('mousemove', throttle(onMouseMove, 100), false);
                document.getElementById('request-fullscreen').addEventListener('click', onRequestFullscreen, false);
                document.getElementById('request-files').addEventListener('click', onRequestFiles, false);
                document.getElementById('file-input').addEventListener("change", handleFiles);
            })

            // File Manager
            const STORE_NAME = "FILE_DATA";
            const PATH = "/brogue/";
            let db = null;

            function downloadFile(uint8Array, filename, contentType) {
              const blob = new Blob([uint8Array], { type: contentType });
              const exportUrl = URL.createObjectURL(blob);
              const a = document.createElement("a");
              document.body.appendChild(a); // Append link to body to ensure it's clickable in all browsers

              a.href = exportUrl;
              a.download = filename; // The 'download' attribute suggests a filename
              a.target = "_self"; // Open in the same tab
              a.click();

              document.body.removeChild(a);
              URL.revokeObjectURL(exportUrl);
            }

            function requestFileForDownload(fileName) {
              const transaction = db.transaction([STORE_NAME], "readonly");
              const objectStore = transaction.objectStore(STORE_NAME);
              const request = objectStore.get(PATH+fileName);
              request.onerror = (event) => {
                // Handle errors!
              };
              request.onsuccess = (event) => {
                downloadFile(request.result.contents, fileName, "text/plain"); 
              };
            }


            function requestDeleteFile(fileName, ele) {
              const transaction = db.transaction([STORE_NAME], "readwrite");
              const objectStore = transaction.objectStore(STORE_NAME);
              const request = objectStore.delete(PATH+fileName);
              request.onerror = (event) => {
                // Handle errors!
              };
              request.onsuccess = (event) => {
                ele.parentNode.removeChild(ele);
              };
            }

            function requestWriteFile(fileName, fileData) {
              const transaction = db.transaction([STORE_NAME], "readwrite");
              const objectStore = transaction.objectStore(STORE_NAME);

              const newFile = {
                contents: new Uint8Array(fileData),
                mode: 0o100666,
                timestamp: new Date(),
              };
              const request = objectStore.add(newFile, PATH+fileName);
              request.onsuccess = (event) => {
                console.log("Data added successfully", event.target.result);
                const FILES = document.getElementById("file-manager");
                addFileListItem(FILES,fileName);
              };
              request.onerror = (event) => {
                console.error("Error adding data:", event.target.error);
              };
            }

            function addFileListItem(FILES, fileName) {
              fileName = fileName.replaceAll(PATH,"");
              const a = document.createElement("div");
              a.className = "list-item";

              const del = document.createElement("img");
              del.src = "delete.svg";
              del.className = "delete";
              del.addEventListener("click",() => requestDeleteFile(fileName, a));
              a.appendChild(del)

              const save = document.createElement("img");
              save.src = "download.svg";
              save.className = "download";
              save.addEventListener("click",() => requestFileForDownload(fileName));
              a.appendChild(save);

              const txt = document.createElement("span");
              txt.className = "item-text";
              txt.textContent = fileName;
              a.appendChild(txt)
              FILES.appendChild(a); // Append link to body to ensure it's clickable in all browsers
            }

            function listAllObjects() {
              const transaction = db.transaction([STORE_NAME], "readonly");
              const objectStore = transaction.objectStore(STORE_NAME);
              const allKeysReq = objectStore.getAllKeys();
              allKeysReq.onsuccess = function(event) {
                const allKeys = event.target.result;
                const FILES = document.getElementById("file-manager");
                allKeys.forEach(key => {
                  addFileListItem(FILES, key);
                });
              };

              allKeysReq.onerror = function(event) {
                console.error("Error retrieving all objects:", event.target.error);
              };

              // Optional: monitor the transaction completion
              transaction.oncomplete = function() {
                console.log("Transaction completed.");
              };
            }

            // IndexedDB
            function readDatabase() {
              // Let us open our database
              const request = window.indexedDB.open("/brogue");
              request.onerror = (event) => {
                console.error("Why didn't you allow my web app to use IndexedDB?!");
              };
              request.onsuccess = (event) => {
                db = event.target.result;
                db.onerror = (event) => {
                  // Generic error handler for all errors targeted at this database's requests!
                  console.error(`Database error: ${event.target.error?.message}`);
                };

                listAllObjects();
              };
            }

            function handleFiles() {
              const selectedFiles = this.files; // This is a FileList object

              if (selectedFiles.length > 0) {
                const firstFile = selectedFiles[0];
                const reader = new FileReader();

                // Define what to do when the file is loaded
                reader.onload = function(event) {
                  const fileContent = event.target.result;
                  console.log('File content (as text):', fileContent);
                  requestWriteFile(firstFile.name, fileContent);
                };

                // Read the file content
                reader.readAsArrayBuffer(firstFile);
              }
            }
      </script>
    </head>
    <body oncontextmenu="return false;">
        <div id="project-info">
            Report any issues to <a href="https://github.com/tmewett/BrogueCE" target="_blank" rel="noopener noreferrer">BrogueCE</a>.
            <div id="left-nav">
                <a href="#" id="request-fullscreen">Fullscreen</a>
                --
                <a href="#" id="request-files">Files</a>
            </div>
            <a href="#" class="close" onclick="this.parentElement.style.display='none';">[X]</a>
        </div>
        <div id="file-manager" class="floating-div">
            <a href="#" class="close" onclick="this.parentElement.style.zIndex=-1000;">[X]&nbsp;&nbsp;</a>
            <span>File Manager - upload, download, or delete save files and recordings</span>
            <hr/>
            Add new file: <input type="file" id="file-input" accept=".broguerec, .broguesave">
            <hr/>
        </div>
        <!-- Canvas size enforces tile aspect ratio 10px wide 19px high -->
        <canvas id="game-canvas" width="1000px" height="646px"></canvas>
        <iframe id="game-frame" src="brogue.html"></iframe>
    </body>
</html>
